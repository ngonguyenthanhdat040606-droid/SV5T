<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Sinh viên 5 tốt Digital</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-primary {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        }
        
        .gradient-secondary {
            background: linear-gradient(135deg, #06B6D4 0%, #0891B2 100%);
        }
        
        .login-container {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.8) 100%);
            backdrop-filter: blur(10px);
        }
        
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(40px);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.2);
        }
    </style>
</head>
<body class="gradient-primary min-h-screen flex items-center justify-center p-4">

    <!-- Floating Background Elements -->
    <div class="floating-orb floating w-96 h-96 bg-cyan-500 -top-20 -left-20"></div>
    <div class="floating-orb floating w-72 h-72 bg-blue-500 -bottom-20 -right-20" style="animation-delay: 2s;"></div>
    
    <div class="relative z-10 w-full max-w-md">
        <!-- Logo & Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-16 h-16 gradient-secondary rounded-2xl shadow-lg shadow-cyan-500/30 mb-6">
                <span class="text-white text-3xl font-bold">5T</span>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2">Sinh viên 5 tốt</h1>
            <p class="text-cyan-300 text-sm">Trường Đại học Sài Gòn</p>
        </div>

        <!-- Login Card -->
        <div class="login-container rounded-3xl p-8 border border-slate-700/50 shadow-2xl mb-8">
            
            <!-- Tab Navigation -->
            <div class="flex gap-4 mb-8 bg-slate-800/50 rounded-xl p-1">
                <button id="tab-student" class="flex-1 py-2 px-4 rounded-lg font-semibold transition text-white bg-cyan-600 hover:bg-cyan-700" onclick="switchLoginTab('student')">
                    <i data-lucide="graduation-cap" class="w-4 h-4 inline mr-2"></i> Sinh viên
                </button>
                <button id="tab-admin" class="flex-1 py-2 px-4 rounded-lg font-semibold transition text-slate-400 hover:text-white" onclick="switchLoginTab('admin')">
                    <i data-lucide="shield-check" class="w-4 h-4 inline mr-2"></i> Ban Hội
                </button>
            </div>

            <!-- Student Login Form -->
            <div id="form-student" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-white mb-2">
                        <i data-lucide="mail" class="w-4 h-4 inline mr-2"></i>
                        Email / Mã sinh viên
                    </label>
                    <input 
                        type="text" 
                        id="student-email"
                        placeholder="3120410xxx hoặc email@sgu.edu.vn"
                        class="input-field w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                    />
                </div>

                <div>
                    <label class="block text-sm font-semibold text-white mb-2">
                        <i data-lucide="lock" class="w-4 h-4 inline mr-2"></i>
                        Mật khẩu
                    </label>
                    <div class="relative">
                        <input 
                            type="password"
                            id="student-password"
                            placeholder="••••••••"
                            class="input-field w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                        />
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition" onclick="togglePassword('student-password')">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-slate-300 cursor-pointer">
                        <input type="checkbox" class="rounded" />
                        Nhớ tôi
                    </label>
                    <a href="#" class="text-cyan-400 hover:text-cyan-300 transition font-semibold">Quên mật khẩu?</a>
                </div>

                <button onclick="loginStudent()" class="w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-cyan-500 to-cyan-600 hover:from-cyan-600 hover:to-cyan-700 transition shadow-lg shadow-cyan-500/30 mt-6">
                    <i data-lucide="log-in" class="w-4 h-4 inline mr-2"></i>
                    Đăng nhập
                </button>

                <p class="text-center text-slate-400 text-sm mt-4">
                    Chưa có tài khoản? 
                    <a href="#" class="text-cyan-400 hover:text-cyan-300 font-semibold transition">Đăng ký ngay</a>
                </p>
            </div>

            <!-- Admin Login Form -->
            <div id="form-admin" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-semibold text-white mb-2">
                        <i data-lucide="building-2" class="w-4 h-4 inline mr-2"></i>
                        Tài khoản Ban Hội
                    </label>
                    <select id="admin-unit" class="input-field w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:border-cyan-500 focus:outline-none">
                        <option value="hoi_tong">Hội Sinh viên Trường</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-white mb-2">
                        <i data-lucide="user" class="w-4 h-4 inline mr-2"></i>
                        Tên đăng nhập
                    </label>
                    <input 
                        type="text"
                        id="admin-username"
                        placeholder="admin_username"
                        class="input-field w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                    />
                </div>

                <div>
                    <label class="block text-sm font-semibold text-white mb-2">
                        <i data-lucide="lock" class="w-4 h-4 inline mr-2"></i>
                        Mật khẩu
                    </label>
                    <div class="relative">
                        <input 
                            type="password"
                            id="admin-password"
                            placeholder="••••••••"
                            class="input-field w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                        />
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition" onclick="togglePassword('admin-password')">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button onclick="loginAdmin()" class="w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-cyan-500 to-cyan-600 hover:from-cyan-600 hover:to-cyan-700 transition shadow-lg shadow-cyan-500/30 mt-6">
                    <i data-lucide="log-in" class="w-4 h-4 inline mr-2"></i>
                    Đăng nhập Ban Hội
                </button>
            </div>
        </div>

        <!-- Demo Credentials -->
        <div class="bg-slate-800/30 rounded-xl p-4 border border-slate-700/50">
            <p class="text-xs text-slate-400 mb-2 flex items-center gap-2">
                <i data-lucide="info" class="w-4 h-4"></i>
                Demo - Tài khoản mẫu:
            </p>
            <div class="grid grid-cols-2 gap-3 text-xs text-slate-300">
                <div>
                    <p class="font-semibold text-cyan-400">Sinh viên:</p>
                    <p>MSV: 3120410001</p>
                    <p>Pass: 123456</p>
                </div>
                <div>
                    <p class="font-semibold text-cyan-400">Ban Hội:</p>
                    <p>User: admin</p>
                    <p>Pass: 123456</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function switchLoginTab(tab) {
            const studentForm = document.getElementById('form-student');
            const adminForm = document.getElementById('form-admin');
            const tabStudent = document.getElementById('tab-student');
            const tabAdmin = document.getElementById('tab-admin');

            if (tab === 'student') {
                studentForm.classList.remove('hidden');
                adminForm.classList.add('hidden');
                tabStudent.classList.add('bg-cyan-600', 'text-white');
                tabStudent.classList.remove('text-slate-400');
                tabAdmin.classList.remove('bg-cyan-600', 'text-white');
                tabAdmin.classList.add('text-slate-400');
            } else {
                studentForm.classList.add('hidden');
                adminForm.classList.remove('hidden');
                tabAdmin.classList.add('bg-cyan-600', 'text-white');
                tabAdmin.classList.remove('text-slate-400');
                tabStudent.classList.remove('bg-cyan-600', 'text-white');
                tabStudent.classList.add('text-slate-400');
            }
        }

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }

        async function loginStudent() {
            const email = document.getElementById('student-email').value.trim();
            const password = document.getElementById('student-password').value;
            if (!email || !password) {
                alert('Vui lòng nhập MSV và mật khẩu');
                return;
            }
            try {
                const res = await fetch('/api/auth/student-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('userRole', 'student');
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userFaculty', data.user.faculty);
                    window.location.href = 'dashboard-student.html';
                } else {
                    alert(data.message || 'Sai MSV hoặc mật khẩu');
                }
            } catch (err) {
                // Fallback demo khi server chưa chạy
                if (email === '3120410001' && password === '123456') {
                    localStorage.setItem('userRole', 'student');
                    localStorage.setItem('userId', email);
                    localStorage.setItem('userName', 'Nguyễn Văn A');
                    window.location.href = 'dashboard-student.html';
                } else {
                    alert('⚠️ Không thể kết nối server. Dùng MSV: 3120410001 / Pass: 123456 để demo.');
                }
            }
        }

        async function loginAdmin() {
            const unit = document.getElementById('admin-unit').value;
            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;
            if (!unit || !username || !password) {
                alert('Vui lòng nhập đầy đủ thông tin');
                return;
            }
            try {
                const res = await fetch('/api/auth/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('userRole', 'admin');
                    localStorage.setItem('userId', username);
                    localStorage.setItem('adminUnit', unit);
                    window.location.href = 'dashboard-admin.html';
                } else {
                    alert(data.message || 'Sai tên đăng nhập hoặc mật khẩu');
                }
            } catch (err) {
                // Fallback demo khi server chưa chạy
                if (username === 'admin' && password === '123456') {
                    localStorage.setItem('userRole', 'admin');
                    localStorage.setItem('userId', username);
                    localStorage.setItem('adminUnit', unit);
                    window.location.href = 'dashboard-admin.html';
                } else {
                    alert('⚠️ Không thể kết nối server. Dùng admin / 123456 để demo.');
                }
            }
        }

        // Handle Enter key
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                const adminForm = document.getElementById('form-admin');
                if (adminForm.classList.contains('hidden')) {
                    loginStudent();
                } else {
                    loginAdmin();
                }
            }
        });
    </script>
</body>
</html>
